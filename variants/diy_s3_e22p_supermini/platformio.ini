[DIY_S3_E22P_SuperMini]
extends = esp32_base
board = esp32-s3-supermini
build_flags =
  ${esp32_base.build_flags}
  -I variants/diy_s3_e22p_supermini
  -D DIY_S3_E22P_SUPERMINI
  -D P_LORA_DIO_1=1
  -D P_LORA_BUSY=13
  -D P_LORA_RESET=12
  -D P_LORA_MISO=11
  -D P_LORA_MOSI=10
  -D P_LORA_SCLK=9
  -D P_LORA_NSS=8
  -D P_LORA_EN=5
  -D PIN_USER_BTN=0
  -D PIN_VBAT_READ=3
;  -D P_LORA_TX_LED=48
;  -D PIN_STATUS_LED=48
  -D P_LORA_TX_NEOPIXEL_LED=48
;  -D HAS_NEOPIXEL
;  -D NEOPIXEL_COUNT=1
;  -D NEOPIXEL_DATA=48
;  -D NEOPIXEL_TYPE=NEO_GRB+NEO_KHZ800
  -D SX126X_REGISTER_PATCH=1
  -D SX126X_RXEN=RADIOLIB_NC
  -D SX126X_TXEN=RADIOLIB_NC
  -D SX126X_DIO2_AS_RF_SWITCH=true
  -D SX126X_DIO3_TCXO_VOLTAGE=1.8
  -D SX126X_CURRENT_LIMIT=140
  -D USE_SX1262
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D LORA_TX_POWER=10
  -D MAX_LORA_TX_POWER=16 ; Allow setting up to 16dBm in companion radio
  -D SX126X_RX_BOOSTED_GAIN=1
build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/diy_s3_e22p_supermini>
  +<helpers/sensors>
lib_deps =
  ${esp32_base.lib_deps}

[DIY_S3_E22P_SuperMini_oled]
extends = DIY_S3_E22P_SuperMini
build_flags =
  ${DIY_S3_E22P_SuperMini.build_flags}
  -D DIY_S3_E22P_SUPERMINI_OLED
  -D PIN_BOARD_SDA=6
  -D PIN_BOARD_SCL=7
#  -D PIN_OLED_RESET=2
  -D DISPLAY_CLASS=SSD1306Display
build_src_filter= ${DIY_S3_E22P_SuperMini.build_src_filter}
  +<helpers/ui/SSD1306Display.cpp>
lib_deps = 
  ${DIY_S3_E22P_SuperMini.lib_deps}
  adafruit/Adafruit SSD1306 @ ^2.5.13

[env:DIY_S3_E22P_SuperMini_repeater]
extends = DIY_S3_E22P_SuperMini
build_flags =
  ${DIY_S3_E22P_SuperMini.build_flags}
  -D ADVERT_NAME='"DIY_S3 E22P SuperMini Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${DIY_S3_E22P_SuperMini.build_src_filter}
  +<../examples/simple_repeater>
lib_deps =
  ${DIY_S3_E22P_SuperMini.lib_deps}
  ${esp32_ota.lib_deps}

[env:DIY_S3_E22P_SuperMini_mqtt_repeater]
extends = DIY_S3_E22P_SuperMini
board_build.partitions = min_spiffs.csv
build_flags =
  ${DIY_S3_E22P_SuperMini.build_flags}
  -D ADVERT_NAME='"DIY_S3 E22P SuperMini Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
  -D WITH_MQTT_UPLINK=1
  -D MQTT_DEBUG=1
;  -D WIFI_SSID='"myssid"'
;  -D WIFI_PWD='"mypwd"'
  -D MQTT_DEFAULT_IATA='"UNSET"'
  -D CONFIG_MBEDTLS_CERTIFICATE_BUNDLE=1
build_src_filter = ${DIY_S3_E22P_SuperMini.build_src_filter}
  +<../examples/simple_repeater>
  +<helpers/mqtt/*.cpp>
  +<helpers/web/*.cpp>
lib_deps =
  ${DIY_S3_E22P_SuperMini.lib_deps}
  ${esp32_ota.lib_deps}

